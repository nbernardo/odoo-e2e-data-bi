services:
  db:
    image: postgres:15
    environment:
      - POSTGRES_DB=postgres
      - POSTGRES_PASSWORD=odoo
      - POSTGRES_USER=odoo
    ports:
      - "9876:5432" 
    volumes:
      - odoo-db-data:/var/lib/postgresql/data

  web:
    image: odoo:16.0  # Switched from 17.0 to 16.0
    depends_on:
      - db
    ports:
      - "8069:8069"
    environment:
      - HOST=db
      - USER=odoo
      - PASSWORD=odoo
    volumes:
      - odoo-web-data:/var/lib/odoo
      - ./extra-addons:/mnt/extra-addons

volumes:
  odoo-db-data:
  odoo-web-data: