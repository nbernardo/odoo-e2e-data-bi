@if(this.runningOnOdoo)
<style>
	div:has(.this-is-the-bi-view) { width: 100%; }
	.this-is-the-bi-view .popup-mov-window{ width: 100%; }
	.this-is-the-bi-view .main { height: 92.5vh; padding: 15px; }
	.this-is-the-bi-view .tableContainer { height: 76vh; }
	.this-is-the-bi-view .empty-dashboard { height: 75vh; }
	.this-is-the-bi-view .tab-sheet, .this-is-the-bi-view .tab-chart, .this-is-the-bi-view .tab-dashboard { padding-top: 8px; }
</style>
@endif

@if(!this.runningOnOdoo)
<style>
	.this-is-the-bi-view .popup-mov-window{ width: 115%; }
	.this-is-the-bi-view .chart-builder { height: 64vh; }
	.this-is-the-bi-view .tableContainer { height: 59vh; }
</style>
@endif
<div class="window-popup-mov-window this-is-the-bi-view" (showIf)="self.showWindowPopup">
	<!-- <button onclick="component.openPopup()">Open Popup-mov-window</button> -->
	<div id="container-@uniqueId" class="popup-windows-cmp-container">
		<div id="@uniqueId" class="popup-mov-window data-catalog-ui-container" 
			style="height: 95%; top: 50%; left: 41%;">
			<span>
				
			</span>
			<div class="resize-handle n"></div>
			<div class="resize-handle s"></div>
			<div class="resize-handle w"></div>
			<div class="resize-handle e"></div>
			<div class="resize-handle nw"></div>
			<div class="resize-handle ne"></div>
			<div class="resize-handle sw"></div>
			<div class="resize-handle se"></div>

			<span (showIf)="!self.runningOnOdoo">
				<div class="popup-mov-window-header-@uniqueId popup-mov-window-header">
					<div class="popup-mov-window-title">Data Visualization and BI</div>
					<div class="popup-mov-window-controls">
						<button class="minimize" style="visibility: hidden;" onclick="component.toggleMinimize()">−</button>
						<button class="maximize" style="visibility: hidden;" onclick="component.toggleMaximize()">□</button>
						<button class="close" onclick="component.closePopup()">×</button>
					</div>
				</div>
			</span>

			<div class="popup-mov-window-content">
				<div class="bi-user-interface-component-body">
					<div class="shell">
						<header class="topbar" style="display: flex;">
							<div style="display: flex;">
								<div class="logo"><div class="logo-dot"></div>DataViz</div>
								<div class="topbar-divider"></div>
								<select class="pipeline-selector" onchange="controller.onPipelineChange(this.value)">
									<option value="p1">pipeline_at_mssql_adventureworks</option>
									<option value="p2">pipeline_at_oracle_hr</option>
									<option value="p3">pipeline_at_postgres_sales</option>
								</select>
							</div>
							<div class="e2e-chat-container" id="chat_wrapper">
								<textarea id="ai_input" class="e2e-chat-input" placeholder="Chat with e2e-Data..."></textarea>

								<div id="ai_agent_ui" class="e2e-agent-ui e2e-hidden">
									<span id="ai_question_label" style="color: #0056b3; font-weight: bold;"></span>
									<div id="ai_pills" style="display: flex;"></div>
									<button onclick="controller.resetToInputMode()" style="background:none; border:none; cursor:pointer; color:#999; margin-left:10px;">✕</button>
								</div>
							</div>
							<div class="topbar-actions" style="width: 295px;">
								<button class="btn btn-ghost" style="width: 290px;flex: 1.2;" onclick="controller.exportCSV()">↓ Export CSV</button>
								<button class="btn btn-accent" id="btnPublish" style="width: 290px;flex: 2;" onclick="controller.openPublishModal()">
									<div class="publish-dot"></div>Publish to Dashboard
								</button>
							</div>
						</header>

						<aside class="sidebar">
							<div class="sidebar-section">
							<div class="sidebar-title">Tables</div>
							<div class="tableList"></div>
							</div>
							<div class="sidebar-sep"></div>
							<div class="sidebar-section">
							<div class="sidebar-title">Saved Charts</div>
							<div class="chartList"></div>
							</div>
						</aside>

						<main class="main">
							<nav class="tabs">
							<div class="tab active" onclick="controller.switchTab('sheet',this)">Spreadsheet</div>
							<div class="tab" onclick="controller.switchTab('chart',this)">Chart Builder</div>
							<div class="tab" onclick="controller.switchTab('dashboard',this)">Dashboard</div>
							</nav>

							<div class="content active tab-sheet">
							<div class="sheet-toolbar">
								<div class="search-wrap"><input class="search-input" id="searchInput" placeholder="Search..." oninput="controller.filterRows(this.value)"></div>
								<select class="field-select" style="width:auto" id="colFilter" onchange="controller.filterRows(document.getElementById('searchInput').value)"><option value="">All columns</option></select>
								<button class="btn btn-ghost" onclick="controller.addColumn()" style="width: 87px;">+ Add Col</button>
								<div class="stats-row">
								<div class="stat-chip">Rows: <span id="rowCount">0</span></div>
								<div class="stat-chip">Cols: <span id="colCount">0</span></div>
								<div class="stat-chip">Selected: <span id="selCount">0</span></div>
								</div>
							</div>
							<div class="table-wrap tableContainer">
								<div id="colInsertLine" class="col-insert-line" onclick="controller.insertColumnAtGap()"></div>
								<table id="dataTable"><thead id="tableHead"></thead><tbody id="tableBody"></tbody></table>
							</div>
							</div>

							<div class="content tab-chart">
								<div class="chart-builder">
								<div class="chart-config">
									<div>
									<div class="config-section-title">Chart Type</div>
									<div class="chart-type-grid chartTypeGrid"></div>
									</div>
									<div>
									<div class="config-section-title">Data</div>
									<label class="field-label">X Axis / Labels</label>
									<select class="field-select" id="xAxisSelect"></select>
									<label class="field-label" style="margin-top:10px;">Y Axis / Values</label>
									<select class="field-select" id="yAxisSelect"></select>
									<label class="field-label" style="margin-top:10px;">Aggregation</label>
									<select class="field-select" id="aggSelect">
										<option value="none">None (raw values)</option>
										<option value="count">Count</option>
										<option value="sum">Sum</option>
										<option value="avg">Average</option>
										<option value="max">Max</option>
										<option value="min">Min</option>
									</select>
									</div>
								</div>
								<div class="chart-preview">
									<div class="chart-preview-header">
										<div>
											<div class="chart-preview-title" id="previewTitle">Chart Preview</div>
											<div>
												<div class="chart-style-config-wrapper" style="display: flex; gap: 10px;">
													<div>
														<label class="field-label">Chart Title</label>
														<input class="chart-title-input chartTitleInput" placeholder="Chart title..." value="My Chart">
													</div>
													<div>
														<label class="field-label">Color</label>
														<div class="color-row" id="colorRow"></div>
													</div>
												</div>
											</div>
										</div>
										<div style="display: flex; gap: 6px;">
											<button class="btn btn-ghost" style="width: 90px;" onclick="controller.buildChart()">↺ Preview</button>
											<!-- <button class="btn btn-primary" style="width: 95px" onclick="controller.buildChart()">Build Chart</button> -->
											<button class="btn btn-ghost" style="width: 95px" onclick="controller.saveChart()">Save Chart</button>
										</div>
									</div>
									<div class="chart-canvas-wrap"><canvas id="chartCanvas"></canvas></div>
								</div>
								</div>
							</div>

							<div class="content tab-dashboard">
							<div class="dashboard-toolbar">
								<select class="field-select dashSelect" style="width:220px;" onchange="loadDashboard(this.value)"></select>
								<button class="btn btn-ghost" style="width: 135px;" onclick="controller.newDashboard()">+ New Dashboard</button>
							</div>
							<div class="dashboard-grid dashGrid"></div>
							</div>
						</main>
					</div>

					<div class="modal-overlay" id="publishModal">
						<div class="modal">
						<div class="modal-title">Publish to Dashboard</div>
						<label class="field-label">Select Dashboard</label>
						<select class="dashboard-select publishDashSelect"></select>
						<label class="field-label">Or create new</label>
						<input class="new-dash-input" id="newDashInput" placeholder="New dashboard name...">
						<div class="modal-footer">
							<button class="btn btn-ghost" onclick="closePublishModal()">Cancel</button>
							<button class="btn btn-primary" onclick="publishChart()">Publish</button>
						</div>
						</div>
					</div>
					<div class="toast" id="toast"></div>

				</div>
			</div>
		</div>
	</div>
</div>
